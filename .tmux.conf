# Right side: System stats (CPU/Mem/Batt) and time
set -g status-right ""
set -ga status-right "#[bg=default,fg=#{@thm_yellow},bold] ´Æø #(~/.config/tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load -i 2 -m 2 | awk \'{print substr($1, 1, 4)}\')%% "
