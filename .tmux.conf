# Reload config with 'r'
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Use C-space as prefix
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Mouse, base indexing, and window renumbering
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vi-mode for copy mode, Emacs for status line
set-window-option -g mode-keys vi
set-option -g status-keys emacs

# Keybindings: Navigation and Splitting
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key m resize-pane -Z
bind-key n new-window -c '#{pane_current_path}'
bind "'" split-window -h -c "#{pane_current_path}"
bind "/" split-window -v -c "#{pane_current_path}"
bind-key ';' next-window
bind-key ',' previous-window

# Copy-mode selection keys
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# True color support
set-option -ga terminal-overrides ",xterm-256color:Tc"

# --- Plugin Manager (TPM) ---
set -g @tpm_plugins '
    tmux-plugins/tpm \
    tmux-plugins/tmux-online-status \
    tmux-plugins/tmux-battery \
    tmux-plugins/tmux-cpu \
    tmux-plugins/tmux-yank \
    thewtex/tmux-mem-cpu-load \
    christoomey/vim-tmux-navigator \
    laktak/extrakto \
'

# --- Catppuccin Configuration ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Load external colors if file exists
if-shell '[ -f ~/.config/tmux/colors.conf ]' "source-file ~/.config/tmux/colors.conf"

# --- Status Bar Look & Feel ---
set -g status-position top
set -g status-style "bg=default"
set -g status-justify "absolute-centre"
set -g status-left-length 100
set -g status-right-length 100

# Left side: Session, command, and path
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold] ¯»ê  #S },#{#[bg=default,fg=#{@thm_red},bold] ¯»ê  #S }}"
set -ga status-left "#[default]#[bg=default,fg=#{@thm_red},none,bold]Ôöé"
